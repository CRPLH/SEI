<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AssessorApp · Prototip</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',system-ui,sans-serif;}
body{background:#f5f5f3;height:100vh;display:flex;flex-direction:column;overflow:hidden;}
#login{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:14px;padding:20px;}
#app{display:none;height:100vh;flex-direction:column;}

.login-card{background:#fff;border:1px solid #e0e0e0;border-radius:12px;padding:28px 24px;width:100%;max-width:360px;display:flex;flex-direction:column;align-items:center;gap:14px;box-shadow:0 2px 12px rgba(0,0,0,.07);}
.login-card h2{font-size:20px;font-weight:600;color:#1a1a1a;}
.login-card p{font-size:13px;color:#888;text-align:center;line-height:1.5;}
.profile-btns{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;width:100%;max-width:360px;}
.pbtn{cursor:pointer;border:1px solid #ddd;background:#fff;border-radius:8px;padding:9px 16px;font-size:14px;color:#333;}
.pbtn:hover{background:#f0effe;border-color:#7f77dd;}
.pbtn.admin{background:#3c3489;color:#fff;border-color:#3c3489;}
.pbtn.admin:hover{background:#534ab7;}
.hint{font-size:12px;color:#aaa;text-align:center;}

.topbar{background:#fff;border-bottom:1px solid #e5e5e5;padding:10px 18px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.top-left span:first-child{display:block;font-size:15px;font-weight:600;color:#1a1a1a;}
.top-left span:last-child{display:block;font-size:12px;color:#888;}
.nova-btn{background:#3c3489;color:#fff;border:none;border-radius:8px;padding:9px 16px;font-size:13px;cursor:pointer;font-weight:500;}
.nova-btn:hover{background:#534ab7;}

.layout{display:flex;flex:1;overflow:hidden;}
.sidebar{width:230px;min-width:230px;background:#fff;border-right:1px solid #e5e5e5;display:flex;flex-direction:column;overflow-y:auto;}
.sidebar-lbl{font-size:11px;font-weight:600;color:#bbb;text-transform:uppercase;letter-spacing:.06em;padding:14px 14px 5px;}
.citem{padding:9px 12px;cursor:pointer;font-size:13px;color:#555;border-radius:8px;margin:2px 6px;display:flex;align-items:center;justify-content:space-between;gap:6px;}
.citem:hover{background:#f5f5f3;}
.citem.active{background:#eeedfe;color:#3c3489;font-weight:600;}
.citem-nom{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.badge{background:#e24b4a;color:#fff;font-size:10px;font-weight:700;border-radius:20px;padding:1px 6px;min-width:18px;text-align:center;flex-shrink:0;}

.userbar{border-top:1px solid #e5e5e5;padding:10px 14px;display:flex;align-items:center;gap:8px;margin-top:auto;}
.u-name{font-size:13px;font-weight:600;color:#1a1a1a;}
.u-team{font-size:11px;color:#888;}
.out-btn{margin-left:auto;cursor:pointer;border:1px solid #ddd;background:#fff;border-radius:6px;padding:4px 8px;font-size:11px;color:#555;}
.out-btn:hover{background:#fef2f2;border-color:#f09595;color:#a32d2d;}

.main{flex:1;overflow-y:auto;padding:18px;}

/* Search */
.search-wrap{position:relative;margin-bottom:14px;}
.search-wrap input{width:100%;border:1px solid #ddd;border-radius:8px;padding:8px 12px 8px 34px;font-size:13px;font-family:inherit;color:#1a1a1a;background:#fff;}
.search-wrap input:focus{outline:none;border-color:#7f77dd;}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:14px;pointer-events:none;}
.search-count{font-size:12px;color:#aaa;margin-bottom:10px;}

.stats{display:flex;gap:10px;margin-bottom:16px;}
.stat{background:#fff;border:1px solid #e5e5e5;border-radius:8px;padding:12px 14px;flex:1;}
.stat .val{font-size:24px;font-weight:600;color:#1a1a1a;}
.stat .lbl{font-size:11px;color:#888;margin-top:2px;}

/* Cards amb color per equip */
.card{border-radius:10px;padding:14px;margin-bottom:10px;border-left:4px solid transparent;}
.card-eap{background:#f5f3ff;border-left-color:#7f77dd;border:1px solid #d8d4f5;border-left:4px solid #7f77dd;}
.card-crp{background:#f0faf5;border-left-color:#1d9e75;border:1px solid #b8e8d5;border-left:4px solid #1d9e75;}
.card-elic{background:#fef5f1;border-left-color:#d85a30;border:1px solid #f5c4b3;border-left:4px solid #d85a30;}
.card-admin{background:#f0f6fd;border-left-color:#378add;border:1px solid #b5d4f4;border-left:4px solid #378add;}

.card-head{display:flex;align-items:center;gap:10px;margin-bottom:6px;}
.avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0;}
.av-eap{background:#eeedfe;color:#3c3489;}
.av-crp{background:#e1f5ee;color:#085041;}
.av-elic{background:#faece7;color:#712b13;}
.av-admin{background:#e6f1fb;color:#0c447c;}
.tag{display:inline-block;font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px;margin-right:4px;}
.t-eap{background:#eeedfe;color:#3c3489;}
.t-crp{background:#e1f5ee;color:#085041;}
.t-elic{background:#faece7;color:#712b13;}
.t-tipo{background:rgba(0,0,0,.06);color:#555;}
.card-meta{font-size:11px;color:#888;margin-bottom:8px;}
.card-text{font-size:13px;color:#333;line-height:1.6;}
.new-dot{display:inline-block;background:#e24b4a;color:#fff;font-size:9px;font-weight:700;border-radius:20px;padding:1px 6px;margin-left:6px;vertical-align:middle;}

.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:200px;gap:8px;color:#aaa;}
.empty-icon{font-size:32px;}

/* Modal */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;align-items:center;justify-content:center;}
.modal-bg.show{display:flex;}
.modal{background:#fff;border-radius:14px;padding:22px;width:420px;max-width:95vw;box-shadow:0 8px 40px rgba(0,0,0,.18);}
.modal h3{font-size:15px;font-weight:600;margin-bottom:16px;color:#1a1a1a;}
.form-row{margin-bottom:13px;}
.form-row label{display:block;font-size:12px;color:#888;margin-bottom:4px;font-weight:500;}
.form-row input,.form-row select,.form-row textarea{width:100%;border:1px solid #ddd;border-radius:8px;padding:8px 10px;font-size:13px;font-family:inherit;color:#1a1a1a;background:#fff;}
.form-row input:focus,.form-row select:focus,.form-row textarea:focus{outline:none;border-color:#7f77dd;}
.form-row textarea{resize:none;}
.two-col{display:flex;gap:10px;}
.two-col .form-row{flex:1;}
.tipo-row{display:flex;gap:6px;flex-wrap:wrap;}
.tbtn{cursor:pointer;border:1px solid #ddd;border-radius:8px;padding:7px 11px;font-size:12px;background:#f5f5f3;color:#555;font-family:inherit;}
.tbtn:hover{background:#eeedfe;border-color:#7f77dd;color:#3c3489;}
.tbtn.sel{border-color:#534ab7;background:#eeedfe;color:#3c3489;font-weight:600;}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;}
.btn-sec{cursor:pointer;border:1px solid #ddd;background:#fff;border-radius:8px;padding:8px 14px;font-size:13px;color:#333;font-family:inherit;}
.btn-sec:hover{background:#f5f5f3;}

/* Llegenda */
.llegenda{display:flex;gap:14px;margin-bottom:14px;flex-wrap:wrap;}
.leg-item{display:flex;align-items:center;gap:5px;font-size:12px;color:#555;}
.leg-dot{width:12px;height:12px;border-radius:3px;flex-shrink:0;}
.leg-eap{background:#7f77dd;}
.leg-crp{background:#1d9e75;}
.leg-elic{background:#d85a30;}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login">
  <div class="login-card">
    <div style="font-size:40px;">📚</div>
    <h2>AssessorApp</h2>
    <p>Plataforma de seguiment de centres educatius.<br>Entra amb el teu compte Google XTEC.</p>
    <div style="width:100%;height:1px;background:#eee;"></div>
    <p style="font-size:12px;color:#aaa;">Tria un perfil per explorar el prototip:</p>
  </div>
  <div class="profile-btns">
    <button class="pbtn" onclick="login('joan')">Joan &middot; EAP</button>
    <button class="pbtn" onclick="login('maria')">Maria &middot; CRP</button>
    <button class="pbtn" onclick="login('berta')">Berta &middot; ELIC</button>
    <button class="pbtn admin" onclick="login('admin')">Superusuari</button>
  </div>
  <p class="hint">Cada perfil veu únicament els seus centres assignats</p>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <div class="top-left">
      <span id="top-nom">AssessorApp</span>
      <span id="top-tipus"></span>
    </div>
    <button class="nova-btn" id="nova-btn" style="display:none;" onclick="openModal()">+ Nova entrada</button>
  </div>
  <div class="layout">
    <div class="sidebar">
      <div class="sidebar-lbl">Els meus centres</div>
      <div id="centre-list"></div>
      <div class="userbar">
        <div>
          <div class="u-name" id="u-name"></div>
          <div class="u-team" id="u-team"></div>
        </div>
        <button class="out-btn" onclick="logout()">Sortir</button>
      </div>
    </div>
    <div class="main" id="main">
      <div class="empty">
        <div class="empty-icon">🏫</div>
        <div>Selecciona un centre per veure les entrades</div>
      </div>
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-bg" id="modal-bg" onclick="bgClose(event)">
  <div class="modal">
    <h3>Nova entrada</h3>
    <div class="form-row">
      <label>Tipus d'entrada</label>
      <div class="tipo-row">
        <button class="tbtn sel" onclick="selTipo(this,'notes')">Notes / observacions</button>
        <button class="tbtn" onclick="selTipo(this,'plans')">Pla d'actuació</button>
        <button class="tbtn" onclick="selTipo(this,'seguiment')">Seguiment d'objectius</button>
      </div>
    </div>
    <div class="two-col">
      <div class="form-row">
        <label>Data de la visita</label>
        <input type="date" id="m-data">
      </div>
      <div class="form-row">
        <label>Tipus de visita</label>
        <select id="m-tipus">
          <option>Visita presencial</option>
          <option>Videoconferència</option>
          <option>Assessorament puntual</option>
          <option>Reunió de coordinació</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <label>Observacions</label>
      <textarea id="m-text" rows="4" placeholder="Escriu les teves observacions, acords o el seguiment corresponent..."></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn-sec" onclick="closeModal()">Cancel·lar</button>
      <button class="nova-btn" onclick="save()">Desar entrada</button>
    </div>
  </div>
</div>

<script>
var users = {
  joan:  { name:'Joan Puig',   team:'EAP',   av:'JP', avc:'av-eap',   tc:'t-eap',  cc:'card-eap',  centres:['capsa','lluna','mare'] },
  maria: { name:'Maria Valls', team:'CRP',   av:'MV', avc:'av-crp',   tc:'t-crp',  cc:'card-crp',  centres:['capsa','sol','mare'] },
  berta: { name:'Berta Font',  team:'ELIC',  av:'RF', avc:'av-elic',  tc:'t-elic', cc:'card-elic', centres:['capsa','lluna','riu'] },
  admin: { name:'Superusuari', team:'Admin', av:'SU', avc:'av-admin', tc:'t-eap',  cc:'card-admin',centres:['capsa','lluna','sol','riu','mare','nord'] }
};
var centres = {
  capsa: { nom:'Escola Capsa',         tipus:'Escola primària' },
  lluna: { nom:'Escola la Lluna',      tipus:'Escola primària' },
  sol:   { nom:'Escola el Sol',        tipus:'Escola primària' },
  riu:   { nom:'Escola del Riu',       tipus:'Escola primària' },
  mare:  { nom:'Institut Mare de Déu', tipus:'Institut de secundària' },
  nord:  { nom:'Institut Nord',        tipus:'Institut de secundària' }
};
var TIPOS = { notes:'Notes / observacions', plans:"Pla d'actuació", seguiment:"Seguiment d'objectius" };

// Data simulada: entrades existents amb dates anteriors a la última visita de cada usuari
// "lastSeen" simula quan l'usuari va mirar per última vegada cada centre
var lastSeen = {
  joan:  { capsa:'2025-03-11', lluna:'2025-03-09', mare:'2025-02-01' },
  maria: { capsa:'2025-03-13', sol:'2025-03-01',   mare:'2025-03-15' },
  Berta: { capsa:'2025-03-14', lluna:'2025-03-01', riu:'2025-03-01' },
  admin: {}
};

var entries = [
  { id:1,  centre:'capsa', autor:'joan',  tipo:'notes',     data:'2025-03-10', vis:'Visita presencial',     text:"Parlat amb la tutora de 3r sobre dificultats de comprensió lectora d'en Marc. Es revisarà el PI abans de Pasqua." },
  { id:2,  centre:'capsa', autor:'maria', tipo:'plans',     data:'2025-03-12', vis:'Visita presencial',     text:"Pla de suport per a alumnes de 5è amb NEE. La coordinadora pedagògica s'incorpora a les properes reunions de seguiment." },
  { id:3,  centre:'capsa', autor:'Berta', tipo:'seguiment', data:'2025-03-15', vis:'Videoconferència',      text:"4 de 6 alumnes han assolit el nivell esperat en llengua. Cal reforçar l'expressió oral al proper trimestre." },
  { id:4,  centre:'lluna', autor:'joan',  tipo:'notes',     data:'2025-03-08', vis:'Assessorament puntual', text:"Consulta sobre possible assetjament entre iguals. S'ha activat el protocol i s'han informat les famílies." },
  { id:5,  centre:'mare',  autor:'maria', tipo:'seguiment', data:'2025-03-14', vis:'Reunió de coordinació', text:"Primera reunió trimestral. Bon ambient. Pendents les adaptacions curriculars de dos alumnes de 2n ESO." },
  { id:6,  centre:'capsa', autor:'joan',  tipo:'seguiment', data:'2025-02-20', vis:'Visita presencial',     text:"Revisió del pla d'actuació anterior. Es compleixen 3 dels 4 objectius marcats. El quart queda pendent per al proper mes." },
  { id:7,  centre:'lluna', autor:'Berta', tipo:'notes',     data:'2025-03-10', vis:'Visita presencial',     text:"Detecció d'un alumne de 4t amb possible dislèxia. S'ha acordat iniciar l'avaluació psicopedagògica." },
  { id:8,  centre:'mare',  autor:'joan',  tipo:'plans',     data:'2025-03-16', vis:'Visita presencial',     text:"Nou pla d'actuació per al departament d'orientació. Prioritat: millora de la detecció precoç de necessitats." }
];

var cu = null, cc = null, ctipo = 'notes', nid = 20;
var searchTerm = '';

function login(uid) {
  cu = uid;
  var u = users[uid];
  document.getElementById('login').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  document.getElementById('u-name').textContent = u.name;
  document.getElementById('u-team').textContent = u.team;
  renderSidebar();
}

function logout() {
  cu = null; cc = null; searchTerm = '';
  document.getElementById('app').style.display = 'none';
  document.getElementById('login').style.display = 'flex';
  document.getElementById('top-nom').textContent = 'AssessorApp';
  document.getElementById('top-tipus').textContent = '';
  document.getElementById('nova-btn').style.display = 'none';
  document.getElementById('main').innerHTML = '<div class="empty"><div class="empty-icon">🏫</div><div>Selecciona un centre per veure les entrades</div></div>';
}

function countNew(uid, cid) {
  if (uid === 'admin') return 0;
  var seen = (lastSeen[uid] && lastSeen[uid][cid]) ? lastSeen[uid][cid] : '1900-01-01';
  return entries.filter(function(e) {
    return e.centre === cid && e.autor !== uid && e.data > seen;
  }).length;
}

function renderSidebar() {
  var u = users[cu];
  var html = '';
  u.centres.forEach(function(cid) {
    var c = centres[cid];
    var ico = c.tipus.includes('Institut') ? '🏛️' : '🏫';
    var n = countNew(cu, cid);
    var badgeHtml = n > 0 ? '<span class="badge">' + n + '</span>' : '';
    html += '<div class="citem" id="ci-' + cid + '" onclick="selCentre(\'' + cid + '\')">';
    html += '<span class="citem-nom">' + ico + ' ' + c.nom + '</span>';
    html += badgeHtml;
    html += '</div>';
  });
  document.getElementById('centre-list').innerHTML = html;
}

function selCentre(cid) {
  cc = cid; searchTerm = '';
  document.querySelectorAll('.citem').forEach(function(el) { el.classList.remove('active'); });
  var ci = document.getElementById('ci-' + cid);
  if (ci) ci.classList.add('active');
  var c = centres[cid];
  document.getElementById('top-nom').textContent = c.nom;
  document.getElementById('top-tipus').textContent = c.tipus;
  document.getElementById('nova-btn').style.display = cu === 'admin' ? 'none' : 'block';
  renderMain(cid);
}

function renderMain(cid) {
  var seen = (cu !== 'admin' && lastSeen[cu] && lastSeen[cu][cid]) ? lastSeen[cu][cid] : '9999-99-99';
  var all = entries.filter(function(e) { return e.centre === cid; })
                   .sort(function(a,b) { return b.data.localeCompare(a.data); });

  var filtered = searchTerm
    ? all.filter(function(e) {
        var q = searchTerm.toLowerCase();
        return e.text.toLowerCase().includes(q) ||
               users[e.autor].name.toLowerCase().includes(q) ||
               users[e.autor].team.toLowerCase().includes(q) ||
               TIPOS[e.tipo].toLowerCase().includes(q) ||
               e.data.includes(q);
      })
    : all;

  var autors = [];
  all.forEach(function(e) { if (autors.indexOf(e.autor) < 0) autors.push(e.autor); });

  var m = document.getElementById('main');

  // Stats
  var statsHtml = '<div class="stats">';
  statsHtml += '<div class="stat"><div class="val">' + all.length + '</div><div class="lbl">Entrades totals</div></div>';
  statsHtml += '<div class="stat"><div class="val">' + autors.length + '</div><div class="lbl">Equips amb entrades</div></div>';
  statsHtml += '</div>';

  // Llegenda equips
  var llegendaHtml = '<div class="llegenda">';
  llegendaHtml += '<div class="leg-item"><div class="leg-dot leg-eap"></div> EAP</div>';
  llegendaHtml += '<div class="leg-item"><div class="leg-dot leg-crp"></div> CRP</div>';
  llegendaHtml += '<div class="leg-item"><div class="leg-dot leg-elic"></div> ELIC</div>';
  llegendaHtml += '</div>';

  // Cercador
  var searchHtml = '<div class="search-wrap">';
  searchHtml += '<span class="search-icon">🔍</span>';
  searchHtml += '<input type="text" id="search-input" placeholder="Cerca per paraula clau, equip, data..." value="' + escHtml(searchTerm) + '" oninput="onSearch(this.value)">';
  searchHtml += '</div>';

  var countHtml = searchTerm
    ? '<div class="search-count">' + filtered.length + ' resultat' + (filtered.length !== 1 ? 's' : '') + ' per &ldquo;' + escHtml(searchTerm) + '&rdquo;</div>'
    : '';

  // Cards
  var cardsHtml = '';
  if (filtered.length === 0) {
    cardsHtml = '<div class="empty"><div class="empty-icon">🔍</div><div>Cap resultat per a aquesta cerca</div></div>';
  } else {
    filtered.forEach(function(e) {
      var u = users[e.autor];
      var isNew = cu !== 'admin' && e.autor !== cu && e.data > seen;
      cardsHtml += '<div class="card ' + u.cc + '">';
      cardsHtml += '<div class="card-head">';
      cardsHtml += '<div class="avatar ' + u.avc + '">' + u.av + '</div>';
      cardsHtml += '<div style="flex:1;">';
      cardsHtml += '<span style="font-size:13px;font-weight:600;color:#1a1a1a;margin-right:4px;">' + u.name + '</span>';
      cardsHtml += '<span class="tag ' + u.tc + '">' + u.team + '</span>';
      cardsHtml += '<span class="tag t-tipo">' + TIPOS[e.tipo] + '</span>';
      if (isNew) cardsHtml += '<span class="new-dot">NOU</span>';
      cardsHtml += '</div></div>';
      cardsHtml += '<div class="card-meta">' + e.data + ' &middot; ' + e.vis + '</div>';
      cardsHtml += '<div class="card-text">' + escHtml(e.text) + '</div>';
      cardsHtml += '</div>';
    });
  }

  m.innerHTML = statsHtml + llegendaHtml + searchHtml + countHtml + cardsHtml;
  // Mantenir el focus al cercador si s'estava cercant
  if (searchTerm) {
    var inp = document.getElementById('search-input');
    if (inp) { inp.focus(); inp.setSelectionRange(inp.value.length, inp.value.length); }
  }
}

function onSearch(val) {
  searchTerm = val;
  if (cc) renderMain(cc);
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function openModal() {
  if (!cc) return;
  document.getElementById('m-data').value = new Date().toISOString().split('T')[0];
  document.getElementById('m-text').value = '';
  ctipo = 'notes';
  document.querySelectorAll('.tbtn').forEach(function(b) { b.classList.remove('sel'); });
  document.querySelectorAll('.tbtn')[0].classList.add('sel');
  document.getElementById('modal-bg').classList.add('show');
}

function closeModal() {
  document.getElementById('modal-bg').classList.remove('show');
}

function bgClose(e) {
  if (e.target === document.getElementById('modal-bg')) closeModal();
}

function selTipo(btn, tipo) {
  ctipo = tipo;
  document.querySelectorAll('.tbtn').forEach(function(b) { b.classList.remove('sel'); });
  btn.classList.add('sel');
}

function save() {
  var text = document.getElementById('m-text').value.trim();
  var data = document.getElementById('m-data').value;
  var vis  = document.getElementById('m-tipus').value;
  if (!text || !data) { alert('Omple el text i la data!'); return; }
  entries.push({ id:nid++, centre:cc, autor:cu, tipo:ctipo, data:data, vis:vis, text:text });
  // Actualitzar lastSeen per a aquest usuari i centre
  if (!lastSeen[cu]) lastSeen[cu] = {};
  lastSeen[cu][cc] = data;
  closeModal();
  renderSidebar();
  renderMain(cc);
}
</script>
